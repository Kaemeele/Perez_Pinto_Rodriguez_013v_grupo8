
services:
  # -------------------------------------------------------------
  # Base de Datos (MySQL)
  # -------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: bullycars-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - bullycars-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------
  # Infraestructura de Mensajería (Kafka + Zookeeper)
  # -------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bullycars-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bullycars-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bullycars-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - bullycars-net

  # -------------------------------------------------------------
  # Infraestructura Spring Cloud (Eureka Server)
  # -------------------------------------------------------------
  eureka-server:
    build:
      context: ./BullyCars/eureka-server
    container_name: bullycars-eureka-server
    ports:
      - "8761:8761"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bullycars-net

  # -------------------------------------------------------------
  # API Gateway
  # -------------------------------------------------------------
  api-gateway:
    build:
      context: ./BullyCars/API-Gateway
    container_name: bullycars-api-gateway
    ports:
      - "8081:8081"
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - bullycars-net

  # -------------------------------------------------------------
  # Microservicios de Negocio (10 Servicios)
  # -------------------------------------------------------------
  clientes-service:
    build:
      context: ./BullyCars/Clientes
    container_name: bullycars-clientes-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/db_clientes?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      KAFKA_SERVERS: kafka:29092
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - bullycars-net

  vehiculos-service:
