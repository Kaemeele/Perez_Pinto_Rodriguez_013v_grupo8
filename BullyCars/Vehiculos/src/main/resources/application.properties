server.port=8083
spring.application.name=vehiculos-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3310/db_vehiculos?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:Bully-cars}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:qwerty123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}