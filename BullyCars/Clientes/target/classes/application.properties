# Puerto nativo asignado en Duoc UC para evitar colisiones
server.port=8082
spring.application.name=clientes-service

# CONEXIÓN CORREGIDA A MYSQL LARAGON (Puerto de datos 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/db_clientes?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración del motor de persistencia Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Registro en el Director de Orquesta de tu arquitectura
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/