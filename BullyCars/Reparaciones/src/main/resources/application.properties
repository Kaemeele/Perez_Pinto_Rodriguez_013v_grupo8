server.port=8086

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3310/db_reparaciones?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.application.name=reparaciones-service
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}